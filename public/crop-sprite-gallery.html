<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>作物形态图谱</title>
  <style>
    html, body { margin: 0; background: #f7fbf5; }
    body { width: 1180px; min-height: 760px; overflow: hidden; }
    svg { display: block; width: 1180px; height: 760px; }
  </style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760">
  <defs>
    <linearGradient id="sheetBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbef"/>
      <stop offset="100%" stop-color="#e2f3ed"/>
    </linearGradient>
    <linearGradient id="stageBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfeefa"/>
      <stop offset="30%" stop-color="#cfeefa"/>
      <stop offset="30%" stop-color="#dcebbd"/>
      <stop offset="44%" stop-color="#dcebbd"/>
      <stop offset="44%" stop-color="#b97a45"/>
      <stop offset="100%" stop-color="#9a5f35"/>
    </linearGradient>
    <linearGradient id="stem" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#245f27"/>
      <stop offset="45%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#43a047"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#43a047"/>
      <stop offset="100%" stop-color="#66bb6a"/>
    </linearGradient>
    <radialGradient id="roundLeaf" cx="35%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="58%" stop-color="#43a047"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </radialGradient>
    <filter id="plantShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#224f30" flood-opacity="0.13"/>
    </filter>
    <style>
      .title { font: 900 34px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #124027; }
      .sub { font: 700 16px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #55715d; }
      .name { font: 950 22px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #173824; text-anchor: middle; }
      .desc { font: 700 13px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #627468; text-anchor: middle; }
      .card { fill: rgba(255,255,255,0.9); stroke: rgba(43,94,54,0.18); filter: url(#cardShadow); }
      .stage { fill: url(#stageBg); }
      .soil { fill: rgba(163,96,48,0.26); }
      .stem { fill: url(#stem); }
      .leaf { fill: url(#leaf); }
      .round { fill: url(#roundLeaf); }
      .plant { filter: url(#plantShadow); }
      .grain { fill: #d9b856; }
      .flower { fill: #f0cf2d; }
      .cotton { fill: #fffef4; stroke: rgba(207,207,188,0.95); stroke-width: 1.5; }
    </style>
  </defs>

  <rect width="1180" height="760" fill="url(#sheetBg)"/>
  <text x="42" y="58" class="title">页面作物形态图谱</text>
  <text x="42" y="88" class="sub">使用当前项目 PlantSprite 风格绘制的 8 种作物形态</text>
  <text x="960" y="88" class="sub">耕地资源与粮食安全</text>

  <!-- Card template positions: x,y -->
  <g transform="translate(42 122)">
    <rect class="card" width="250" height="275" rx="18"/>
    <rect class="stage" width="250" height="198" rx="18"/>
    <rect class="soil" y="88" width="250" height="110"/>
    <ellipse cx="125" cy="166" rx="60" ry="13" fill="rgba(38,54,28,0.15)"/>
    <g class="plant" transform="translate(125 158) scale(1.75)">
      <rect class="stem" x="-3" y="-52" width="6" height="52" rx="3"/>
      <rect class="grain" x="-5" y="-64" width="10" height="13" rx="5"/>
      <ellipse class="leaf" cx="-13" cy="-34" rx="14" ry="5" transform="rotate(-30 -13 -34)"/>
      <ellipse class="leaf" cx="13" cy="-28" rx="14" ry="5" transform="rotate(30 13 -28)"/>
      <ellipse class="leaf" cx="-12" cy="-20" rx="13" ry="5" transform="rotate(-22 -12 -20)"/>
      <ellipse class="leaf" cx="11" cy="-13" rx="12" ry="5" transform="rotate(22 11 -13)"/>
    </g>
    <text x="125" y="235" class="name">玉米</text>
    <text x="125" y="260" class="desc">高秆、宽叶、顶端穗</text>
  </g>

  <g transform="translate(320 122)">
    <rect class="card" width="250" height="275" rx="18"/>
    <rect class="stage" width="250" height="198" rx="18"/>
    <rect class="soil" y="88" width="250" height="110"/>
    <ellipse cx="125" cy="166" rx="56" ry="12" fill="rgba(38,54,28,0.15)"/>
    <g class="plant" transform="translate(125 158) scale(2.05)">
      <rect class="stem" x="-2" y="-24" width="4" height="24" rx="2"/>
      <circle class="round" cx="-13" cy="-10" r="8"/>
      <circle class="round" cx="0" cy="-22" r="8"/>
      <circle class="round" cx="13" cy="-10" r="8"/>
      <circle class="round" cx="-8" cy="-27" r="7"/>
      <circle class="round" cx="8" cy="-29" r="7"/>
    </g>
    <text x="125" y="235" class="name">大豆</text>
    <text x="125" y="260" class="desc">矮株、圆叶、丛生</text>
  </g>

  <g transform="translate(598 122)">
    <rect class="card" width="250" height="275" rx="18"/>
    <rect class="stage" width="250" height="198" rx="18"/>
    <rect class="soil" y="88" width="250" height="110"/>
    <ellipse cx="125" cy="166" rx="50" ry="11" fill="rgba(38,54,28,0.15)"/>
    <g class="plant" transform="translate(125 158) scale(2.25)">
      <path class="leaf" d="M-8 0 C-12 -15 -10 -28 -5 -36 C-2 -24 -2 -12 -3 0Z"/>
      <path class="leaf" d="M-4 0 C-7 -15 -5 -31 -1 -39 C1 -25 1 -12 0 0Z"/>
      <path class="leaf" d="M1 0 C0 -17 2 -32 5 -40 C8 -25 7 -10 5 0Z"/>
      <path class="leaf" d="M5 0 C6 -15 10 -28 15 -35 C15 -21 12 -9 9 0Z"/>
      <path class="leaf" d="M-1 0 C-2 -14 -1 -27 2 -34 C4 -21 4 -10 3 0Z"/>
    </g>
    <text x="125" y="235" class="name">水稻</text>
    <text x="125" y="260" class="desc">细长稻苗、小簇生长</text>
  </g>

  <g transform="translate(876 122)">
    <rect class="card" width="250" height="275" rx="18"/>
    <rect class="stage" width="250" height="198" rx="18"/>
    <rect class="soil" y="88" width="250" height="110"/>
    <ellipse cx="125" cy="166" rx="50" ry="11" fill="rgba(38,54,28,0.15)"/>
    <g class="plant" transform="translate(125 158) scale(2.15)">
      <rect class="stem" x="-8" y="-39" width="3" height="39" rx="2" transform="rotate(-5 -7 0)"/>
      <rect class="stem" x="-1.5" y="-41" width="3" height="41" rx="2"/>
      <rect class="stem" x="5" y="-39" width="3" height="39" rx="2" transform="rotate(5 6 0)"/>
      <rect class="grain" x="-11" y="-52" width="8" height="15" rx="4"/>
      <rect class="grain" x="-4" y="-56" width="8" height="15" rx="4"/>
      <rect class="grain" x="3" y="-52" width="8" height="15" rx="4"/>
    </g>
    <text x="125" y="235" class="name">小麦</text>
    <text x="125" y="260" class="desc">细秆、顶部麦穗</text>
  </g>

  <g transform="translate(42 432)">
    <rect class="card" width="250" height="275" rx="18"/>
    <rect class="stage" width="250" height="198" rx="18"/>
    <rect class="soil" y="88" width="250" height="110"/>
    <ellipse cx="125" cy="166" rx="55" ry="12" fill="rgba(38,54,28,0.15)"/>
    <g class="plant" transform="translate(125 158) scale(2.05)">
      <rect class="stem" x="-2" y="-25" width="4" height="25" rx="2"/>
      <circle class="round" cx="-12" cy="-9" r="8"/>
      <circle class="round" cx="10" cy="-12" r="8"/>
      <circle class="cotton" cx="-8" cy="-29" r="5.5"/>
      <circle class="cotton" cx="8" cy="-22" r="5.5"/>
      <circle class="cotton" cx="2" cy="-35" r="5.5"/>
    </g>
    <text x="125" y="235" class="name">棉花</text>
    <text x="125" y="260" class="desc">绿叶、白色棉桃</text>
  </g>

  <g transform="translate(320 432)">
    <rect class="card" width="250" height="275" rx="18"/>
    <rect class="stage" width="250" height="198" rx="18"/>
    <rect class="soil" y="88" width="250" height="110"/>
    <ellipse cx="125" cy="166" rx="56" ry="12" fill="rgba(38,54,28,0.15)"/>
    <g class="plant" transform="translate(125 158) scale(2.2)">
      <ellipse class="round" cx="-12" cy="-7" rx="10" ry="7" transform="rotate(-12 -12 -7)"/>
      <ellipse class="round" cx="0" cy="-17" rx="10" ry="7" transform="rotate(8 0 -17)"/>
      <ellipse class="round" cx="13" cy="-7" rx="10" ry="7" transform="rotate(10 13 -7)"/>
      <ellipse class="round" cx="-5" cy="-24" rx="9" ry="7" transform="rotate(-5 -5 -24)"/>
    </g>
    <text x="125" y="235" class="name">马铃薯</text>
    <text x="125" y="260" class="desc">低矮叶丛、贴近地面</text>
  </g>

  <g transform="translate(598 432)">
    <rect class="card" width="250" height="275" rx="18"/>
    <rect class="stage" width="250" height="198" rx="18"/>
    <rect class="soil" y="88" width="250" height="110"/>
    <ellipse cx="125" cy="166" rx="54" ry="12" fill="rgba(38,54,28,0.15)"/>
    <g class="plant" transform="translate(125 158) scale(2.0)">
      <rect class="stem" x="-2.5" y="-44" width="5" height="44" rx="3"/>
      <ellipse class="leaf" cx="-12" cy="-28" rx="13" ry="5" transform="rotate(-28 -12 -28)"/>
      <ellipse class="leaf" cx="12" cy="-22" rx="13" ry="5" transform="rotate(28 12 -22)"/>
      <circle class="flower" cx="-2" cy="-50" r="4"/>
      <circle class="flower" cx="6" cy="-48" r="4"/>
      <circle class="flower" cx="0" cy="-42" r="4"/>
      <circle class="flower" cx="-10" cy="-38" r="3.5"/>
      <circle class="flower" cx="14" cy="-36" r="3.5"/>
    </g>
    <text x="125" y="235" class="name">油菜</text>
    <text x="125" y="260" class="desc">绿色茎叶、黄色小花</text>
  </g>

  <g transform="translate(876 432)">
    <rect class="card" width="250" height="275" rx="18"/>
    <rect class="stage" width="250" height="198" rx="18"/>
    <rect class="soil" y="88" width="250" height="110"/>
    <ellipse cx="125" cy="166" rx="58" ry="12" fill="rgba(38,54,28,0.15)"/>
    <g class="plant" transform="translate(125 158) scale(2.25)">
      <path class="round" d="M-24 0 C-24 -13 -14 -20 -2 -17 C5 -15 8 -8 5 0Z"/>
      <path class="round" d="M-10 0 C-10 -17 1 -25 13 -20 C21 -16 24 -7 20 0Z"/>
      <path class="round" d="M6 0 C6 -12 16 -19 27 -15 C34 -12 34 -5 30 0Z"/>
    </g>
    <text x="125" y="235" class="name">茶叶</text>
    <text x="125" y="260" class="desc">低矮灌木、茶园条带感</text>
  </g>
</svg>

</body>
</html>
